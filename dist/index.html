  <style>
    body {

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;

      background: #000000;
    }

    ::-webkit-scrollbar-thumb {

    .bg-grid-white {

    .perspective-1000 {
      perspective: 1000px;
    }

    .rotate-x-60 {

    }

    /* Range slider styling */
    input[type=range] {
      -webkit-appearance: none;
      background: transparent;

      width: 16px;
      border-radius: 50%;
      background: #ff0000;
      cursor: pointer;
      margin-top: -6px;

      background: #222222;

    }

    }

      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .prose-blog a:hover {
      color: #ffffff;
    }

    .prose-blog blockquote {
      border-left: 4px solid #ff0000;
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      background: rgba(255, 0, 0, 0.05);
      border-radius: 0 0.75rem 0.75rem 0;
      color: #9ca3af;

      border-radius: 1rem;
